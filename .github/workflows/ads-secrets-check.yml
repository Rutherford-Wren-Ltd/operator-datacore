name: Ads secrets check

# Fast manual smoke test for the ADS_API_* GitHub Secrets.
#
# Runs npm run ads-probe (which performs an LWA token exchange + a
# GET /v2/profiles call). Total runtime ~30-60 seconds. Use this when:
#   - You've just updated one of the ADS_API_* secrets and want to
#     verify the new value before waiting for tomorrow's daily-sync.
#   - The Ads step in daily-sync failed with `invalid_client` and you
#     want a tight feedback loop while debugging.
#
# This workflow only reads — it does NOT write to the database and does
# NOT consume the Ads API report quota. Safe to re-run as often as you
# need.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Ads API probe
        env:
          # Supabase credentials are required by env.ts schema validation
          # even though the probe itself does not touch the database.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # The actual values under test:
          ADS_API_CLIENT_ID: ${{ secrets.ADS_API_CLIENT_ID }}
          ADS_API_CLIENT_SECRET: ${{ secrets.ADS_API_CLIENT_SECRET }}
          ADS_API_REFRESH_TOKEN: ${{ secrets.ADS_API_REFRESH_TOKEN }}
          ADS_PROFILE_ID: ${{ secrets.ADS_PROFILE_ID }}
          ADS_API_REGION: ${{ secrets.ADS_API_REGION }}
          ADS_API_ENDPOINT: ${{ secrets.ADS_API_ENDPOINT }}
        run: npm run ads-probe
