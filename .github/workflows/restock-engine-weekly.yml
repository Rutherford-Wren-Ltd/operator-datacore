name: Restock Engine — Weekly

# Runs the restock engine (`generate-pos`) every Monday, writes the proposal
# report as a workflow artifact, and opens a team-review issue with the
# report inline. The engine itself reads from the data lake (no Amazon API
# calls), so the run is fast (~1–2 minutes) and doesn't fight any external
# rate limits.
#
# Scheduling note: 06:00 UTC on Monday lands the report before Chris's
# 07:00 UK working window so the team has fresh proposals to action first
# thing. DST: 06:00 UTC = 07:00 BST / 06:00 GMT — comfortably pre-day in
# both seasons.
#
# What gets written:
#   - brain.purchase_orders: any prior `restock_engine` draft POs are
#     deleted and rebuilt (idempotency contract — see runbook).
#   - GitHub workflow artifact: full markdown report, 90-day retention.
#   - GitHub Issue: report inline (truncated at 60KB if needed), titled
#     "Restock proposals — YYYY-MM-DD — N SKU(s) triggered".
#
# Lifecycle: the team should ACTION (assign destinations + promote with
# `set-po-status`) any PO they want to keep BEFORE next Monday's run,
# which deletes any remaining `draft` rows. Promoted POs are never
# touched by the engine.
#
# Manual trigger: GitHub Actions → "Restock Engine — Weekly" → Run workflow.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write    # Required to open the team-review issue

jobs:
  generate-pos:
    runs-on: ubuntu-latest
    # Engine runs in ~1-2 min; allow plenty of headroom for a slow lake.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate draft restock POs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run generate-pos -- --report-path ./reorder-proposals.md

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reorder-proposals-${{ github.run_id }}
          path: ./reorder-proposals.md
          retention-days: 90

      - name: Open team-review issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)

          # Pull the three counts from the report's Summary block. Field
          # separator '**' gives: $2=triggering, $4=proposed, $6=draft POs
          # for the line "- Triggering a reorder: **N** → **M** proposed
          # across **K** draft PO(s)".
          N_TRIGGERED=$(awk -F'\\*\\*' '/Triggering a reorder/ {print $2; exit}' ./reorder-proposals.md)
          N_TRIGGERED=${N_TRIGGERED:-0}

          # Truncate the report if it's bigger than GitHub Issues' 65,536
          # char body limit. 60,000 leaves room for the appended footer.
          MAX=60000
          SIZE=$(wc -c < ./reorder-proposals.md)
          if [ "$SIZE" -gt "$MAX" ]; then
            head -c "$MAX" ./reorder-proposals.md > ./issue-body.md
            {
              echo ""
              echo "---"
              echo ""
              echo "**Report truncated** at ${MAX} of ${SIZE} bytes. Full report in the workflow artifact: [reorder-proposals-${GITHUB_RUN_ID}](${RUN_URL})."
            } >> ./issue-body.md
          else
            cp ./reorder-proposals.md ./issue-body.md
          fi

          # Footer: action loop pointer + idempotency reminder.
          {
            echo ""
            echo "---"
            echo ""
            echo "🤖 Auto-generated by [Restock Engine — Weekly](${RUN_URL})."
            echo ""
            echo "**Action loop:** for each draft PO you approve — assign destinations, allocate a real PO number, promote with \`set-po-status\`. See the [runbook](${REPO_URL}/blob/main/docs/runbooks/generate-pos.md#after-a-run--how-to-action-the-drafts)."
            echo ""
            echo "**Idempotency:** next Monday's run deletes any \`restock_engine\` PO still at \`status='draft'\`. Promote what you want to keep before then."
          } >> ./issue-body.md

          gh issue create \
            --title "Restock proposals — ${DATE} — ${N_TRIGGERED} SKU(s) triggered" \
            --body-file ./issue-body.md

      - name: Open failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "Restock engine FAILED — ${DATE}" \
            --body "The weekly restock-engine run failed. See workflow logs: ${RUN_URL}"
