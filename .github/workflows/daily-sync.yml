name: Daily Sync

# Pulls a short rolling window of Sales & Traffic data from SP-API into
# Supabase. Idempotent — re-running re-syncs without duplicating.
#
# RW-AI-OS customisation (see seller-sessions-2026/implementation-plan.md):
# the upstream workflow pulled --months 1 (30 createReport calls) at
# --concurrency 2 with no delay. The Sales & Traffic createReport quota on
# this (brand-new) LWA app is a small burst bucket (~3 calls) with a slow
# refill, so an unbounded delay alone does not clear it. We pull a 3-day
# rolling window (yesterday + a 2-day restatement buffer) at --concurrency 1
# --delay 8000. Amazon restates S&T for 2-3 days; a 2-day window misses
# D-3 restatements (observed live on 2026-05-14: 11 May drifted by £21.98
# after our morning pull, invisible until manually re-pulled). The 3rd call
# can trip the burst ceiling, but client.ts now honours
# x-amzn-RateLimit-Limit / Retry-After on 429 so it waits for the bucket
# rather than failing the run. The window will widen further once Amazon
# raises the app's rate limit with usage history. Large historical
# catch-ups stay a local `npm run backfill` job; they cannot fit the
# Actions timeout under this quota.
#
# To enable:
# 1. In Settings → Secrets and variables → Actions, add the secrets listed
#    under env: below. Use the same values as the local .env.
# 2. Enable Actions in the Actions tab if it isn't already.
#
# Schedule: 15:00 UTC daily. Sales & Traffic data lands by 14:00 UTC, so
# 15:00 gives Amazon an hour of buffer. (pg_cron also rolls up at 14:30;
# this run re-pulls source data and re-rolls for the cleanest read.)

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days back to pull (default: 3 = yesterday + 2-day restatement buffer; >4 may hit the quota wall)'
        type: string
        default: '3'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Step budget at worst case: S&T ~2 min + rollup <1 min + FBA inventory ~25 min
    # + Ads SP up to 30 min (Amazon's report queue is slow and unpredictable).
    # 90 minutes gives meaningful headroom; tighten once we have real workflow
    # timing data from a few runs.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Sales & Traffic
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          FROM=$(date -u -d "${DAYS} days ago" +%F)
          TO=$(date -u -d "yesterday" +%F)
          echo "Pulling Sales & Traffic ${FROM} → ${TO} (concurrency 1, 8s delay between days)"
          npm run backfill -- --source amazon --report sales-traffic \
            --from "$FROM" --to "$TO" --concurrency 1 --delay 8000

      - name: Roll up rollups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
        run: |
          # pg_cron handles this on a 14:30 UTC schedule too, but a fresh roll
          # right after the sync gives the cleanest dashboard read.
          node --input-type=module -e "
            import('pg').then(async ({ Client }) => {
              const c = new Client({ connectionString: process.env.SUPABASE_DB_URL, ssl: { rejectUnauthorized: false } });
              await c.connect();
              const r = await c.query('SELECT * FROM ops.refresh_all_daily()');
              console.log('Rollups refreshed:', r.rowCount, 'rows');
              await c.end();
            });
          "

      - name: Pull FBA inventory snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          # Live JSON snapshot via getInventorySummaries — sits on its own
          # rate-limit bucket, does not compete with the createReport quota
          # the Sales & Traffic pull above consumes. Idempotent for the day:
          # re-running replaces the day's rows.
          npm run inventory-snapshot

      - name: Pull Ads SP + SD daily (D-1)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ADS_API_CLIENT_ID: ${{ secrets.ADS_API_CLIENT_ID }}
          ADS_API_CLIENT_SECRET: ${{ secrets.ADS_API_CLIENT_SECRET }}
          ADS_API_REFRESH_TOKEN: ${{ secrets.ADS_API_REFRESH_TOKEN }}
          ADS_PROFILE_ID: ${{ secrets.ADS_PROFILE_ID }}
          ADS_API_REGION: ${{ secrets.ADS_API_REGION }}
          ADS_API_ENDPOINT: ${{ secrets.ADS_API_ENDPOINT }}
        run: |
          # Sponsored Products advertised-product report for yesterday.
          # Async report: createReport → poll (~1–10 min) → gzipped JSON download
          # → upsert into brain.ads_sp_daily. Idempotent for the date.
          #
          # Attribution windows (sales_7d/14d/30d on a given day) keep growing
          # for up to 30 days as Amazon attributes downstream conversions. We
          # currently capture each day once at D-1; the 30-day numbers are
          # therefore as-of-D rather than fully-ripened. Re-pulling older days
          # to capture ripening is a follow-up (rolling window or a weekly
          # 30-day re-sync).
          npm run ads-ingest
