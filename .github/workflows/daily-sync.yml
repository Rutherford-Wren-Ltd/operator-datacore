name: Daily Sync

# Pulls a short rolling window of Sales & Traffic data from SP-API into
# Supabase. Idempotent — re-running re-syncs without duplicating.
#
# RW-AI-OS customisation (see seller-sessions-2026/implementation-plan.md):
# the upstream workflow pulled --months 1 (30 createReport calls) at
# --concurrency 2 with no delay. Amazon hard-limits GET_SALES_AND_TRAFFIC_REPORT
# to 1 createReport / 15 min, app-wide and permanent (confirmed by Amazon
# 2026-05-26, no increase). backfillSalesTraffic enforces this with a hard
# floor (--delay clamped up to 900000ms, --concurrency clamped to 1), so a
# 3-day × 5-marketplace pull is 15 calls ≈ 3h45m. That cannot share the sync
# job with the ads/inventory steps under GitHub's 6h job cap, so the daily S&T
# steps run with --skip-existing: a normal day pulls only the ~5 new
# (marketplace, day) pairs (~75 min) and older present days are skipped. Missed
# days self-heal; a killed run resumes.
#
# Restatements: Amazon restates S&T for 2-3 days (observed live 2026-05-14:
# 11 May drifted by £21.98 after the morning pull). --skip-existing does NOT
# re-pull an already-present day, so restatement reconciliation is handled by
# the separate sales-traffic-restate-weekly workflow (weekly non-skip re-pull
# of the trailing window). Large historical catch-ups go via the
# sales-traffic-catchup workflow. Neither can fit the daily quota window here.
#
# To enable:
# 1. In Settings → Secrets and variables → Actions, add the secrets listed
#    under env: below. Use the same values as the local .env.
# 2. Enable Actions in the Actions tab if it isn't already.
#
# Schedule: 15:00 UTC daily. Sales & Traffic data lands by 14:00 UTC, so
# 15:00 gives Amazon an hour of buffer. (pg_cron also rolls up at 14:30;
# this run re-pulls source data and re-rolls for the cleanest read.)

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days back to pull (default: 3 = yesterday + 2-day restatement buffer; >4 may hit the quota wall)'
        type: string
        default: '3'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Step budget at worst case:
    #   S&T (EU + NA)           ~75 min  (--skip-existing: ~5 new marketplace-days
    #                                     × 15 min; older present days skipped)
    #   Rollup                  <1 min
    #   FBA inventory (both)    ~20 min total after PR #24 non-zero filter
    #   Ads SP+SD EU multi-profile @ concurrency=2:
    #     ceil(9/2)=5 batches × ~15 min   = ~75 min  (9 EU profiles)
    #   Ads SP+SD NA multi-profile @ concurrency=2:
    #     ceil(3/2)=2 batches × ~15 min   = ~30 min  (3 NA profiles)
    # Total worst-case: ~200 min. Bumped to 240 for margin on a slow Amazon
    # report-queue day. (Was 180 when S&T was budgeted at ~5 min; in reality
    # S&T is quota-bound at ~75 min even with --skip-existing, and as the first
    # step it previously starved the ads/inventory steps by consuming the whole
    # cap — see the S&T note in the header.) Concurrency=2 keeps concurrent
    # reports per batch at 4 (well inside Amazon's typical 5+ per-app limit).
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Sales & Traffic (primary region — EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          FROM=$(date -u -d "${DAYS} days ago" +%F)
          TO=$(date -u -d "yesterday" +%F)
          echo "Pulling Sales & Traffic ${FROM} → ${TO} (concurrency 1, 8s delay between days)"
          # --skip-existing: Amazon caps this report at 1 createReport/15min, so a
          # 3-day × 5-marketplace window is 15 calls ≈ 3h45m — over the 180min job
          # cap. Skipping (marketplace, day) pairs already in the lake keeps a normal
          # daily run to ~5 calls (yesterday × markets). Missed days self-heal; a
          # killed run resumes. Historical restatement re-pulls go via the separate
          # sales-traffic-catchup workflow.
          npm run backfill -- --source amazon --report sales-traffic \
            --from "$FROM" --to "$TO" --concurrency 1 --delay 8000 --skip-existing

      - name: Pull Sales & Traffic (NA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
          SP_API_NA_MARKETPLACE_IDS: ${{ secrets.SP_API_NA_MARKETPLACE_IDS }}
        run: |
          # Same code path as the primary-region pull, just with --region na.
          # Falls back to the per-region default marketplace (US = ATVPDKIKX0DER)
          # if SP_API_NA_MARKETPLACE_IDS is not set.
          DAYS="${{ github.event.inputs.days || '3' }}"
          FROM=$(date -u -d "${DAYS} days ago" +%F)
          TO=$(date -u -d "yesterday" +%F)
          echo "Pulling Sales & Traffic ${FROM} → ${TO} for NA region"
          # --skip-existing: see the EU step above — keeps the daily run inside the
          # 180min job cap given Amazon's 1 createReport/15min limit.
          npm run backfill -- --source amazon --report sales-traffic --region na \
            --from "$FROM" --to "$TO" --concurrency 1 --delay 8000 --skip-existing

      - name: Roll up rollups
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
        run: |
          # pg_cron handles this on a 14:30 UTC schedule too, but a fresh roll
          # right after the sync gives the cleanest dashboard read.
          node --input-type=module -e "
            import('pg').then(async ({ Client }) => {
              const c = new Client({ connectionString: process.env.SUPABASE_DB_URL, ssl: { rejectUnauthorized: false } });
              await c.connect();
              const r = await c.query('SELECT * FROM ops.refresh_all_daily()');
              console.log('Rollups refreshed:', r.rowCount, 'rows');
              await c.end();
            });
          "

      - name: Sync FX rates (GBP/EUR → reporting currency)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          REPORTING_CURRENCY: ${{ secrets.REPORTING_CURRENCY }}
        run: |
          # Cheap, no SP-API quota — pulls ECB daily rates (frankfurter.app) for
          # every non-reporting currency in use into meta.fx_rates so
          # analytics.product_profitability_30d can produce reporting-currency
          # (cm3_rc) columns. Idempotent; backfills any missing recent dates.
          npm run sync-fx-rates

      - name: Pull FBA inventory snapshot (primary region — EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          # Live JSON snapshot via getInventorySummaries — sits on its own
          # rate-limit bucket, does not compete with the createReport quota
          # the Sales & Traffic pull above consumes. Idempotent for the day:
          # re-running replaces the day's rows.
          npm run inventory-snapshot

      - name: Pull FBA inventory snapshot (NA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
          SP_API_NA_MARKETPLACE_IDS: ${{ secrets.SP_API_NA_MARKETPLACE_IDS }}
        run: npm run inventory-snapshot -- --region na

      - name: Pull Ads SP + SD daily (primary region — EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ADS_API_CLIENT_ID: ${{ secrets.ADS_API_CLIENT_ID }}
          ADS_API_CLIENT_SECRET: ${{ secrets.ADS_API_CLIENT_SECRET }}
          ADS_API_REFRESH_TOKEN: ${{ secrets.ADS_API_REFRESH_TOKEN }}
          # Plural takes precedence over singular when both are set.
          # If only the singular ADS_PROFILE_ID is uploaded as a Secret,
          # the CLI falls back to it (single-profile mode).
          ADS_PROFILE_ID: ${{ secrets.ADS_PROFILE_ID }}
          ADS_PROFILE_IDS: ${{ secrets.ADS_PROFILE_IDS }}
          ADS_API_REGION: ${{ secrets.ADS_API_REGION }}
          ADS_API_ENDPOINT: ${{ secrets.ADS_API_ENDPOINT }}
        run: |
          # SP + SD advertised-product reports for yesterday. Each report:
          # createReport → poll (~1-10 min) → gzipped JSON → upsert into
          # brain.ads_sp_daily / brain.ads_sd_daily. SP + SD run in parallel
          # within each (profile, date). Idempotent for the date.
          #
          # --concurrency 2: process 2 profiles in parallel per date.
          # Effective concurrent reports per batch = 4 (2 profiles × SP+SD),
          # well inside Amazon's typical 5+ per-app ceiling. If you've
          # increased your account's Ads API quota, bump to 3.
          #
          # If only ADS_PROFILE_ID (singular) is uploaded as a Secret,
          # the CLI runs single-profile mode and --concurrency 2 simply
          # means "1 profile in batch 1" — no behaviour change.
          #
          # Attribution windows (sales_7d/14d/30d) ripen for up to 30 days
          # post-click. Daily-sync captures each day at D-1; weekly
          # attribution-ripen.yml (Sundays 18:00 UTC) refreshes the last
          # 7 days for both regions.
          npm run ads-ingest -- --concurrency 2

      - name: Pull Ads SP + SD daily (NA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ADS_API_CLIENT_ID: ${{ secrets.ADS_API_CLIENT_ID }}
          ADS_API_CLIENT_SECRET: ${{ secrets.ADS_API_CLIENT_SECRET }}
          ADS_API_NA_REFRESH_TOKEN: ${{ secrets.ADS_API_NA_REFRESH_TOKEN }}
          # Plural takes precedence; singular is the fallback for
          # backward-compat. Upload ADS_API_NA_PROFILE_IDS (plural,
          # comma-separated) to capture all 3 NA profiles.
          ADS_API_NA_PROFILE_ID: ${{ secrets.ADS_API_NA_PROFILE_ID }}
          ADS_API_NA_PROFILE_IDS: ${{ secrets.ADS_API_NA_PROFILE_IDS }}
        run: |
          # Same Ads pipeline, NA region, same --concurrency 2 pattern.
          # 3 NA profiles fit in ceil(3/2)=2 batches × ~15 min = ~30 min.
          npm run ads-ingest -- --region NA --concurrency 2

  # ============================================================================
  # phase7-ingests — runs in PARALLEL with the sync job above.
  #
  # These pull from non-S&T SP-API surfaces (Orders Report, listFinancialEvents,
  # Settlement Report) which have their own rate-limit buckets, so they don't
  # compete with the sync job's createReport quota and can run concurrently
  # without impacting the existing ~135-min worst-case wall-clock.
  #
  # All three CLIs are idempotent for the date window — re-running upserts
  # without duplicating.
  # ============================================================================
  phase7-ingests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull Orders (EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          # 3-day window catches D-2 status changes (cancellations, returns,
          # refunds). Header upsert keyed on (marketplace_id, amazon_order_id);
          # line upsert keyed on synthetic order_item_id = sku||'|'||asin.
          npm run ingest-orders -- --days 3

      - name: Pull Orders (NA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
          SP_API_NA_MARKETPLACE_IDS: ${{ secrets.SP_API_NA_MARKETPLACE_IDS }}
        run: npm run ingest-orders -- --region na --days 3

      - name: Pull Financial Events (EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
        run: |
          # 3-day window catches late-posting fees / adjustments. Idempotency
          # via event_hash on brain.financial_events.
          npm run ingest-finances -- --days 3

      - name: Pull Financial Events (NA)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
        run: npm run ingest-finances -- --region na --days 3

      - name: Pull Settlements (EU)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          # Without this, env.ts falls back to its zod default (ATVPDKIKX0DER = US),
          # and the EU-region listReports call 403s: "marketplaces not valid for
          # region". Amazon tightened region enforcement ~2026-06-30; the call had
          # previously been region-loose. Every sibling EU step already sets this.
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
        run: |
          # Settlements: Amazon auto-generates ~one per 14-day cycle per
          # marketplace, so daily runs are cheap — most days just fire a
          # quick listReports call that returns nothing new. Settlement-level
          # idempotency via raw.sp_api_report.parsed_at; line-level via
          # deterministic line_hash. Window is 30 days back: Amazon's
          # listReports caps `createdSince` at 90 days (older = 400) and
          # 30 covers the last ~2 settlement cycles per marketplace with a
          # wide safety margin against missed days.
          npm run ingest-settlements -- --days 30

      # Removed 2026-06-18 (PR triggered by project review).
      # Previously: "Pull Settlements (NA)" — a redundant belt-and-braces ingest
      # that failed 100% of runs with HTTP 403 from Amazon ("The marketplaces
      # you provided are not valid for region"). Diagnosis found that the EU
      # step above is already retrieving the full multi-region settlement set:
      # Amazon's listReports endpoint is region-loose for this account, and
      # the EU step's call returns settlements for US/CA/MX/BR alongside
      # UK/DE/FR/IT/ES (confirmed via `raw.sp_api_report.marketplace_ids` over
      # 2026-06-11 → 2026-06-17 — 8 marketplaces including ATVPDKIKX0DER all
      # landing via the EU step alone). The NA step added zero data and one
      # failed `meta.sync_run` row per workflow run. If a true region-isolated
      # NA settlement ingest is wanted later as resilience, it needs a separate
      # NA-issued LWA refresh token provisioned via Seller Central — track
      # that as its own project rather than reviving this step.

      - name: Pull FBA storage fees (EU + NA, early/mid month)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
          SP_API_NA_MARKETPLACE_IDS: ${{ secrets.SP_API_NA_MARKETPLACE_IDS }}
        run: |
          # Storage charges are MONTHLY and post in the first week of the
          # following month; aged/LTSF land mid-month. So we only pull on
          # days 1-7 (previous month's storage) and 15-18 (LTSF settle).
          # Idempotent table upsert means re-runs in-window are safe. %-d
          # strips the leading zero so day 08/09 don't trip bash octal arith.
          DOM=$(date -u +%-d)
          if [ "$DOM" -gt 7 ] && { [ "$DOM" -lt 15 ] || [ "$DOM" -gt 18 ]; }; then
            echo "Day-of-month $DOM outside storage-fee window (1-7, 15-18); skipping."
            exit 0
          fi
          npm run ingest-storage-fees

      - name: Pull FBA inventory age (EU + NA, weekly)
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_REGION: ${{ secrets.SP_API_REGION }}
          SP_API_MARKETPLACE_IDS: ${{ secrets.SP_API_MARKETPLACE_IDS }}
          SP_API_NA_REFRESH_TOKEN: ${{ secrets.SP_API_NA_REFRESH_TOKEN }}
          SP_API_NA_MARKETPLACE_IDS: ${{ secrets.SP_API_NA_MARKETPLACE_IDS }}
        run: |
          # Inventory age is a slow-moving snapshot; weekly is plenty. Run on
          # Mondays (UTC) on the schedule, OR any time the workflow is triggered
          # manually (workflow_dispatch) so an operator can pull on demand.
          # Idempotent upsert keyed by snapshot_date makes extra runs safe.
          # %u gives 1=Mon .. 7=Sun. GITHUB_EVENT_NAME is set by the runner.
          DOW=$(date -u +%u)
          if [ "$DOW" -ne 1 ] && [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Day-of-week $DOW is not Monday and not a manual run; skipping inventory-age pull."
            exit 0
          fi
          npm run ingest-inventory-age

      # Dead-man's-switch: queries meta.sync_freshness (migration 0037) and
      # exits non-zero if any object's hours_since_last_success exceeds its
      # inline per-object cadence (orders/sales-traffic/finances/settlements
      # at 25h, weekly objects at 8d, monthly at 35d). The GitHub Actions
      # email-on-failure becomes the single high-signal alert that replaces
      # the previous per-step failure noise — added 2026-06-18 alongside the
      # NA settlement step removal so the workflow goes from "consistently
      # red with one known-benign failure" to "green unless something is
      # actually stale".
      - name: Verify sync freshness
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run verify-sync-freshness
